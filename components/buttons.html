<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hop AI — Buttons</title>
  <link rel="stylesheet" href="../tokens/colors.css">
  <link rel="stylesheet" href="../tokens/typography.css">
  <link rel="stylesheet" href="../tokens/spacing.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { padding: 48px; background: var(--bg-elevated); }

    .showcase { display: flex; flex-direction: column; gap: 48px; max-width: 800px; }
    .group { display: flex; flex-direction: column; gap: 16px; }
    .group h3 { margin-bottom: 8px; }
    .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }

    /* === Button: Primary === */
    .btn-primary {
      background: var(--brand-primary);
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }

    /* === Button: Secondary === */
    .btn-secondary {
      background: var(--brand-secondary);
      color: #fff;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-secondary:hover { opacity: 0.9; }

    /* === Button: Ghost === */
    .btn-ghost {
      background: transparent;
      color: var(--brand-primary);
      padding: 12px 24px;
      border: 1px solid var(--brand-primary);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { background: var(--brand-primary); color: #fff; }

    /* === Button sizes === */
    .btn-sm { padding: 8px 16px; font-size: 0.75rem; }
    .btn-lg { padding: 16px 32px; font-size: 1rem; }

    /* === Disabled === */
    .btn-primary:disabled,
    .btn-secondary:disabled,
    .btn-ghost:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="showcase">
    <div>
      <h1 style="font-size: 3rem; margin-bottom: 8px;">Buttons</h1>
      <p class="text-muted">Primary, secondary, and ghost variants at three sizes.</p>
    </div>

    <div class="group">
      <h3>Primary</h3>
      <p class="text-muted">Main CTAs. One per section.</p>
      <div class="row">
        <button class="btn-primary btn-sm">Small</button>
        <button class="btn-primary">Get Started</button>
        <button class="btn-primary btn-lg">Book a Demo</button>
        <button class="btn-primary" disabled>Disabled</button>
      </div>
    </div>

    <div class="group">
      <h3>Secondary</h3>
      <p class="text-muted">Supporting actions. Used alongside primary.</p>
      <div class="row">
        <button class="btn-secondary btn-sm">Small</button>
        <button class="btn-secondary">Learn More</button>
        <button class="btn-secondary btn-lg">Explore Platform</button>
      </div>
    </div>

    <div class="group">
      <h3>Ghost</h3>
      <p class="text-muted">Low-emphasis actions. Links, secondary navigation.</p>
      <div class="row">
        <button class="btn-ghost btn-sm">Small</button>
        <button class="btn-ghost">See Pricing</button>
        <button class="btn-ghost btn-lg">Watch Video</button>
      </div>
    </div>
  </div>
</body>
</html>
